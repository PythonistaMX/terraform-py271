name: Terraform plan/apply

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Entorno destino
        required: true
        default: test
        type: choice
        options:
          - test
          - prod
      run_apply:
        description: Ejecutar apply despues de plan
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.target_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"

      # Variables Terraform desde GitHub Environment variables/secrets
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_environment: ${{ inputs.target_environment }}
      TF_VAR_app_name: ${{ vars.APP_NAME }}
      TF_VAR_cloud_sql_instance_name: ${{ vars.CLOUD_SQL_INSTANCE_NAME }}
      TF_VAR_cloud_sql_database_name: ${{ vars.CLOUD_SQL_DATABASE_NAME }}
      TF_VAR_cloud_sql_tier: ${{ vars.CLOUD_SQL_TIER }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_enable_deletion_protection: ${{ vars.ENABLE_DELETION_PROTECTION }}
      # Requerido por iam.tf para el attribute_condition del pool WIF.
      # Formato: org/repo (ej. PythonistaMX/api-github-actions-demo).
      TF_VAR_github_repository: ${{ vars.APP_GITHUB_REPOSITORY }}
      # Requerido por main.tf para el recurso google_cloud_run_v2_service.
      TF_VAR_cloud_run_service_name: ${{ vars.GCP_CLOUD_RUN_SERVICE }}

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Authenticate to Google Cloud (OIDC)
        # google-github-actions/auth@v2
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        # hashicorp/setup-terraform@v3
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ inputs.target_environment }}/terraform"

      - name: Trivy — escaneo de configuración IaC
        # Detecta misconfiguraciones en los archivos .tf antes de ejecutar plan.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          hide-progress: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.run_apply == 'true' }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan
